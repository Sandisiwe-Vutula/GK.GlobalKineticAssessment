name: CI — GK Assessment API

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore GK.GlobalKineticAssessment.sln

      - name: Build
        run: dotnet build GK.GlobalKineticAssessment.sln -c Release --no-restore

      # Unit tests — no external services required
      - name: Unit Tests
        run: |
          dotnet test tests/GK.GlobalKineticAssessment.Tests/GK.GlobalKineticAssessment.Tests.csproj \
            -c Release --no-build \
            --filter "Category=Unit" \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory ./TestResults \
            --logger "console;verbosity=normal"

      # Integration tests — use EF InMemory + in-memory cache, no SQL Server or Redis needed
      - name: Integration Tests
        run: |
          dotnet test tests/GK.GlobalKineticAssessment.Tests/GK.GlobalKineticAssessment.Tests.csproj \
            -c Release --no-build \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./TestResults \
            --logger "console;verbosity=normal"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  docker-verify:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (verify only — no push)
        run: |
          docker build \
            --target runtime \
            --tag gk-assessment:ci-${{ github.run_number }} \
            .
          echo "Image built successfully"
          docker image ls gk-assessment:ci-${{ github.run_number }}
